x-app-environment: &app-environment
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-36000000}
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
  OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
  OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
  OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
  OTEL_INSTRUMENTATION_LOGS_MDC_INJECTION: ${OTEL_INSTRUMENTATION_LOGS_MDC_INJECTION:-true}
  JAVA_TOOL_OPTIONS: ${OTEL_JAVA_TOOL_OPTIONS:- -javaagent:/otel/opentelemetry-javaagent.jar}

x-app-service: &app-service
  restart: unless-stopped
  networks:
    - ecommerce-network
  volumes:
    - ./observability/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro

x-postgres-service: &postgres-service
  image: postgres:15
  restart: unless-stopped
  networks:
    - ecommerce-network
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d $${POSTGRES_DB}"]
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 5s

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - cart-service
      - payment-service
      - inventory-service
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres-auth:
    <<: *postgres-service
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  postgres-product:
    <<: *postgres-service
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - product-db-data:/var/lib/postgresql/data

  postgres-order:
    <<: *postgres-service
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - order-db-data:/var/lib/postgresql/data

  postgres-cart:
    <<: *postgres-service
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - cart-db-data:/var/lib/postgresql/data

  postgres-payment:
    <<: *postgres-service
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - payment-db-data:/var/lib/postgresql/data

  postgres-inventory:
    <<: *postgres-service
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - inventory-db-data:/var/lib/postgresql/data

  auth-service:
    <<: *app-service
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    depends_on:
      postgres-auth:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      <<: *app-environment
      OTEL_SERVICE_NAME: auth-service

  product-service:
    <<: *app-service
    build:
      context: .
      dockerfile: product-service/Dockerfile
    depends_on:
      postgres-product:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      <<: *app-environment
      OTEL_SERVICE_NAME: product-service

  order-service:
    <<: *app-service
    build:
      context: .
      dockerfile: order-service/Dockerfile
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      <<: *app-environment
      OTEL_SERVICE_NAME: order-service
      PRODUCT_INTERNAL_TOKEN: ${PRODUCT_INTERNAL_TOKEN}
      TEMPO_BASE_URL: ${TEMPO_BASE_URL:-http://tempo:3200}

  cart-service:
    <<: *app-service
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    depends_on:
      postgres-cart:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      <<: *app-environment
      OTEL_SERVICE_NAME: cart-service
      PRODUCT_INTERNAL_TOKEN: ${PRODUCT_INTERNAL_TOKEN}

  payment-service:
    <<: *app-service
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      <<: *app-environment
      OTEL_SERVICE_NAME: payment-service
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}

  inventory-service:
    <<: *app-service
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    depends_on:
      postgres-inventory:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      <<: *app-environment
      OTEL_SERVICE_NAME: inventory-service

  otel-collector:
    image: otel/opentelemetry-collector:latest
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - ecommerce-network

  tempo:
    image: grafana/tempo:2.10.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
    networks:
      - ecommerce-network

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus
    networks:
      - ecommerce-network

  k6:
    profiles: ["loadtest"]
    image: grafana/k6:latest
    environment:
      AUTH_URL: http://auth-service:8080/api/auth
      PRODUCT_URL: http://product-service:8080/api/products
      CART_URL: http://cart-service:8080/api/cart
      ORDER_URL: http://order-service:8080/api/orders
      PAYMENT_URL: http://payment-service:8080/api/payments
      INVENTORY_URL: http://inventory-service:8080/api/inventory
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "false"
      K6_PROMETHEUS_RW_PUSH_INTERVAL: 15s
    volumes:
      - ./infra/load:/scripts:ro
    command:
      [
        "run",
        "--tag", "app=ecommerce",
        "--out", "experimental-prometheus-rw",
        "/scripts/checkout-login.js"
      ]
    depends_on:
      - prometheus
      - auth-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - inventory-service
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  auth-db-data:
  product-db-data:
  order-db-data:
  cart-db-data:
  payment-db-data:
  inventory-db-data:
  rabbitmq-data:
  grafana-storage:
